<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="page">
  <header class="header">
    <div class="header__container container">
      <a href="#" class="header__logo">Bookshop</a>
      <nav class="header__nav nav">
        <ul class="nav__list">
          <li class="nav__item"><a href="#" class="nav__link nav__link--active">BOOKS</a></li>
          <li class="nav__item"><a href="#" class="nav__link">AUDIOBOOKS</a></li>
          <li class="nav__item"><a href="#" class="nav__link">STATIONERY & GIFTS</a></li>
          <li class="nav__item"><a href="#" class="nav__link">BLOG</a></li>
        </ul>
      </nav>
      <div class="header__icons">
        <button class="header__icon-btn" type="button" aria-label="User profile">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="currentColor"/>
          </svg>
        </button>
        <button class="header__icon-btn" type="button" aria-label="Search">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.5 14H14.71L14.43 13.73C15.41 12.59 16 11.11 16 9.5C16 5.91 13.09 3 9.5 3C5.91 3 3 5.91 3 9.5C3 13.09 5.91 16 9.5 16C11.11 16 12.59 15.41 13.73 14.43L14 14.71V15.5L19 20.49L20.49 19L15.5 14ZM9.5 14C7.01 14 5 11.99 5 9.5C5 7.01 7.01 5 9.5 5C11.99 5 14 7.01 14 9.5C14 11.99 11.99 14 9.5 14Z" fill="currentColor"/>
          </svg>
        </button>
        <button class="header__icon-btn header__icon-btn--cart" type="button" aria-label="Shopping cart">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 18C5.9 18 5.01 18.9 5.01 20C5.01 21.1 5.9 22 7 22C8.1 22 9 21.1 9 20C9 18.9 8.1 18 7 18ZM1 2V4H3L6.6 11.59L5.24 14.04C5.09 14.32 5 14.65 5 15C5 16.1 5.9 17 7 17H19V15H7.42C7.28 15 7.17 14.89 7.17 14.75L7.2 14.63L8.1 13H15.55C16.3 13 16.96 12.59 17.3 11.97L20.88 5.48C20.96 5.34 21 5.17 21 5C21 4.45 20.55 4 20 4H5.21L4.27 2H1ZM17 18C15.9 18 15.01 18.9 15.01 20C15.01 21.1 15.9 22 17 22C18.1 22 19 21.1 19 20C19 18.9 18.1 18 17 18Z" fill="currentColor"/>
          </svg>
          <span class="header__cart-badge" style="display: none;">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="hero container">
      <div class="hero__slider slider">
        <div class="slider__track-container">
            <div class="slider__track">
              <!-- Using the slider images provided from previous project -->
              <div class="slider__slide"><img src="./images/slide1.png" alt="Slider Image 1" class="slider__image"></div>
              <div class="slider__slide"><img src="./images/slide2.png" alt="Slider Image 2" class="slider__image"></div>
              <div class="slider__slide"><img src="./images/slide3.png" alt="Slider Image 3" class="slider__image"></div>
            </div>
        </div>
        <div class="slider__pagination">
          <button class="slider__dot slider__dot--active" type="button" aria-label="Slide 1"></button>
          <button class="slider__dot" type="button" aria-label="Slide 2"></button>
          <button class="slider__dot" type="button" aria-label="Slide 3"></button>
        </div>
      </div>
      <div class="hero__promos">
        <a href="#" class="promo promo--purple">
          <span class="promo__text">CHANGE<br>OLD BOOK<br>ON NEW</span>
          <span class="promo__arrow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>
        <a href="#" class="promo promo--pink">
          <span class="promo__text">TOP<br>100<br>BOOKS<br>2022</span>
          <span class="promo__arrow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>
      </div>
    </section>

    <section class="content container">
      <aside class="sidebar">
        <ul class="category-list">
          <!-- Dynamic -->
        </ul>
      </aside>
      <div class="bookshelf">
        <div class="bookshelf__grid">
          <!-- Dynamic -->
        </div>
        <button class="bookshelf__load-more btn" type="button">LOAD MORE</button>
      </div>
    </section>
  </main>
</body>
</html>
